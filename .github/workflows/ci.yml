name: Docker Build Push
on:
  push:
    branches:
      - main
jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: ap-south-1
      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2
      - name: Build Image
        run: docker build -t myapp .
      - name: Tag Image
        run: docker tag myapp:latest 615299764722.dkr.ecr.us-east-1.amazonaws.com/d2c/test:latest
      - name: Push Image
        run: docker push 615299764722.dkr.ecr.us-east-1.amazonaws.com/d2c/test:latest
